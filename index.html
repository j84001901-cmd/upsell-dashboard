<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포피플 신입 내방콜 전환 프로세스</title>
<style>
  :root{
    --navy:#142850;
    --navy-2:#1e3a66;
    --teal:#2E8B84;
    --teal-light:#e4f2f0;
    --amber:#E2A63B;
    --amber-light:#fbf1de;
    --rose:#C1524B;
    --rose-light:#fbe9e8;
    --indigo:#5B5FC7;
    --olive:#8C7A3B;
    --slate:#57606f;
    --bg:#F3F5F8;
    --card:#FFFFFF;
    --line:#E4E8EE;
    --ink:#1F2430;
    --ink-muted:#6B7280;
    --radius:14px;
    --mono: 'SFMono-Regular', ui-monospace, 'JetBrains Mono', Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    background:#D9DDE3;
    color:var(--ink);
    font-family:'Pretendard','Noto Sans KR','Apple SD Gothic Neo',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    min-height:100vh;display:flex;flex-direction:column;
    background:var(--bg);
    max-width:480px;
    margin:0 auto;
  }
  @media (min-width:520px){
    body{ padding:28px 0; }
    #app{
      min-height:calc(100vh - 56px);
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 20px 50px rgba(20,40,80,0.18);
      border:1px solid rgba(20,40,80,0.08);
    }
  }

  /* top bar */
  .topbar{
    background:var(--navy);
    color:#fff;
    padding:14px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-0.02em;font-size:16px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 4px rgba(46,139,132,0.25);}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;}
  .tab-btn{
    background:transparent;border:none;color:rgba(255,255,255,0.65);
    padding:8px 14px;border-radius:20px;font-size:13.5px;cursor:pointer;
    font-weight:600;transition:all .15s;
  }
  .tab-btn:hover{color:#fff;background:rgba(255,255,255,0.08);}
  .tab-btn.active{background:#fff;color:var(--navy);}
  .who{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,0.8);}
  .who b{color:#fff;}
  .logout-btn{
    background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;
    padding:6px 12px;border-radius:8px;font-size:12.5px;cursor:pointer;
  }
  .logout-btn:hover{background:rgba(255,255,255,0.2);}

  main{flex:1;padding:18px 14px 70px;width:100%;margin:0 auto;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
  .card h2{margin:0 0 4px;font-size:16px;letter-spacing:-0.01em;}
  .card .sub{color:var(--ink-muted);font-size:12.5px;margin-bottom:14px;}

  .grid2{display:grid;grid-template-columns:1fr;gap:14px;}

  label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-muted);margin:12px 0 6px;}
  label:first-child{margin-top:0;}
  input[type=text],input[type=tel],input[type=password],input[type=date],input[type=datetime-local],input[type=file],select,textarea{
    width:100%;padding:12px 12px;border:1px solid var(--line);border-radius:9px;font-size:16px;
    font-family:inherit;background:#FAFBFC;color:var(--ink);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);outline-offset:1px;background:#fff;}
  textarea{resize:vertical;min-height:90px;line-height:1.5;}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    background:var(--navy);color:#fff;border:none;padding:12px 18px;min-height:46px;border-radius:10px;
    font-size:14.5px;font-weight:700;cursor:pointer;transition:transform .1s,opacity .15s;
  }
  .btn:hover{opacity:0.9;}
  .btn:active{transform:scale(0.98);}
  .btn.teal{background:var(--teal);}
  .btn.amber{background:var(--amber);color:#3a2c05;}
  .btn.rose{background:var(--rose);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn.sm{padding:8px 14px;min-height:38px;font-size:13px;}
  .btn:disabled{opacity:0.45;cursor:not-allowed;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}

  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:700;}
  .badge.pending{background:var(--amber-light);color:#8a6417;}
  .badge.approved{background:var(--teal-light);color:#1f5f59;}
  .badge.rejected{background:var(--rose-light);color:#8a2f2a;}
  .badge.visit{background:var(--teal-light);color:#1f5f59;}
  .badge.callback{background:var(--amber-light);color:#8a6417;}
  .badge.declined{background:var(--rose-light);color:#8a2f2a;}

  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -18px;padding:0 18px;}
  table{width:100%;min-width:480px;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--ink-muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;
     padding:8px 8px;border-bottom:1px solid var(--line);white-space:nowrap;}
  td{padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  .muted{color:var(--ink-muted);}
  .empty{padding:30px 10px;text-align:center;color:var(--ink-muted);font-size:13.5px;}

  /* progress ring */
  .ring-wrap{display:flex;align-items:center;gap:18px;}
  .ring-num{font-family:var(--mono);}
  .ring-num .big{font-size:30px;font-weight:700;color:var(--navy);}
  .ring-num .small{font-size:13px;color:var(--ink-muted);}

  /* auth screens */
  .auth-shell{max-width:420px;margin:60px auto;padding:0 16px;}
  .auth-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:32px 28px;}
  .auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-weight:800;font-size:19px;color:var(--navy);}
  .auth-logo .dot{width:10px;height:10px;border-radius:50%;background:var(--teal);}
  .auth-sub{color:var(--ink-muted);font-size:13px;margin-bottom:22px;}
  .switch-line{margin-top:16px;font-size:13px;color:var(--ink-muted);text-align:center;}
  .switch-line a{color:var(--teal);font-weight:700;cursor:pointer;text-decoration:none;}
  .notice{padding:10px 12px;border-radius:9px;font-size:12.5px;margin-bottom:14px;}
  .notice.err{background:var(--rose-light);color:#8a2f2a;}
  .notice.ok{background:var(--teal-light);color:#1f5f59;}
  .notice.info{background:var(--amber-light);color:#8a6417;}

  /* recording box */
  .rec-box{border:1px dashed var(--line);border-radius:12px;padding:16px;background:#FAFBFC;}
  .transcript-box{margin-top:12px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:13.5px;min-height:60px;white-space:pre-wrap;line-height:1.6;}
  .transcript-box.placeholder{color:var(--ink-muted);}

  /* calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-head .month-label{font-weight:700;font-size:16px;}
  .cal-nav{display:flex;gap:6px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{text-align:center;font-size:11.5px;color:var(--ink-muted);font-weight:700;padding-bottom:4px;}
  .cal-cell{
    height:52px;border:1px solid var(--line);border-radius:9px;padding:6px;background:#FAFBFC;
    font-size:11.5px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  }
  .cal-cell.out{opacity:0.35;}
  .cal-cell.has-visits{cursor:pointer;border-color:var(--teal);background:var(--teal-light);}
  .cal-cell.has-visits:hover{opacity:0.85;}
  .cal-cell .d-num{font-family:var(--mono);font-size:11.5px;color:var(--ink-muted);}
  .day-count{
    background:var(--teal);color:#fff;border-radius:20px;padding:1px 8px;
    font-size:10.5px;font-weight:700;line-height:1.5;
  }

  .modal-bg{
    position:fixed;inset:0;background:rgba(15,20,35,0.5);display:flex;align-items:center;justify-content:center;
    z-index:50;padding:16px;
  }
  .modal{background:#fff;border-radius:16px;padding:24px;max-width:520px;width:100%;max-height:86vh;overflow:auto;}
  .modal h3{margin:0 0 4px;}
  .modal .close-x{float:right;cursor:pointer;color:var(--ink-muted);font-size:20px;line-height:1;}
  .feedback-item{background:#FAFBFC;border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:8px;font-size:13px;}
  .feedback-item .meta{color:var(--ink-muted);font-size:11.5px;margin-bottom:4px;}

  .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .pill{
    padding:6px 12px;border-radius:20px;font-size:12.5px;font-weight:700;cursor:pointer;
    border:1px solid var(--line);background:#fff;color:var(--ink-muted);
  }
  .pill.active-visit{background:var(--teal);color:#fff;border-color:var(--teal);}
  .pill.active-callback{background:var(--amber);color:#3a2c05;border-color:var(--amber);}
  .pill.active-declined{background:var(--rose);color:#fff;border-color:var(--rose);}

  .stat-row{display:flex;gap:14px;flex-wrap:wrap;}
  .stat-box{flex:1;min-width:140px;background:#FAFBFC;border:1px solid var(--line);border-radius:10px;padding:14px;}
  .stat-box .num{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--navy);}
  .stat-box .lbl{font-size:12px;color:var(--ink-muted);margin-top:2px;}

  .key-note{font-size:12px;color:var(--ink-muted);background:#FAFBFC;border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:14px;line-height:1.6;}
  .footnote{font-size:11.5px;color:var(--ink-muted);margin-top:6px;}
  .today-banner{
    display:flex;align-items:center;gap:10px;background:linear-gradient(90deg,#fff4e0,#fff9ef);
    border:1px solid var(--amber);border-radius:12px;padding:14px 18px;margin-bottom:18px;
    font-size:14px;font-weight:700;color:#8a6417;
  }
  .today-banner .icon{font-size:20px;}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ====== Supabase 연결 설정 ======
   아래 두 값을 본인의 Supabase 프로젝트 값으로 반드시 교체하세요.
   Supabase 대시보드 > Project Settings > API 에서 확인 가능합니다. */
const SUPABASE_URL = 'https://bmkfqdznnyoidsfwyfhl.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_MVuWLSUX_Vqv9D0f25VSZw_ChDXQLh3';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ---------- storage helpers (Supabase 기반) ---------- */
async function loadUsers(){
  try{
    const { data, error } = await supabaseClient.from('pp_users').select('*');
    if(error) throw error;
    return (data||[]).map(r=>({
      id:r.id, name:r.name, team:r.team, phone:r.phone, password:r.password,
      role:r.role, status:r.status, joinedAt:Number(r.joined_at), callCount:r.call_count||0
    }));
  }catch(e){ console.error('loadUsers error', e); return []; }
}
async function saveUsers(list){
  try{
    const rows = list.map(u=>({
      id:u.id, name:u.name, team:u.team, phone:u.phone, password:u.password,
      role:u.role, status:u.status, joined_at:u.joinedAt, call_count:u.callCount||0
    }));
    const { error } = await supabaseClient.from('pp_users').upsert(rows, { onConflict:'id' });
    if(error) throw error;
  }catch(e){ console.error('saveUsers error', e); }
}
async function loadCalls(){
  try{
    const { data, error } = await supabaseClient.from('pp_calls').select('*');
    if(error) throw error;
    return (data||[]).map(r=>({
      id:r.id, userId:r.user_id, userName:r.user_name, team:r.team,
      createdAt:Number(r.created_at), transcript:r.transcript,
      outcome:r.outcome, visitDate:r.visit_date, feedback:r.feedback||[], audioUrl:r.audio_url||null,
      customerName:r.customer_name||null, customerPhone:r.customer_phone||null
    }));
  }catch(e){ console.error('loadCalls error', e); return []; }
}
async function saveCalls(list){
  try{
    const rows = list.map(c=>({
      id:c.id, user_id:c.userId, user_name:c.userName, team:c.team,
      created_at:c.createdAt, transcript:c.transcript,
      outcome:c.outcome, visit_date:c.visitDate, feedback:c.feedback||[], audio_url:c.audioUrl||null,
      customer_name:c.customerName||null, customer_phone:c.customerPhone||null
    }));
    const { error } = await supabaseClient.from('pp_calls').upsert(rows, { onConflict:'id' });
    if(error) throw error;
  }catch(e){ console.error('saveCalls error', e); }
}
async function loadSession(){
  try{ return localStorage.getItem('pp_session'); }catch(e){ return null; }
}
async function saveSession(userId){
  try{
    if(userId===null){ localStorage.removeItem('pp_session'); }
    else{ localStorage.setItem('pp_session', userId); }
  }catch(e){ console.error('saveSession error', e); }
}
async function loadSharedSetting(key){
  try{
    const { data, error } = await supabaseClient.from('pp_settings').select('*').eq('id', key).maybeSingle();
    if(error) throw error;
    return data ? data.value : '';
  }catch(e){ console.error('loadSharedSetting error', e); return ''; }
}
async function saveSharedSetting(key, value){
  try{
    const { error } = await supabaseClient.from('pp_settings').upsert({ id:key, value }, { onConflict:'id' });
    if(error) throw error;
  }catch(e){ console.error('saveSharedSetting error', e); }
}

function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4); }

const GOAL = 200;
const GROUPS = {
  '천안그룹': ['모산팀','이마트팀','광혜당팀','쌍용팀','온천팀','성정팀','불당팀','오성팀','신부팀'],
  '서해안그룹': ['호수팀','남산팀','터미널팀','서산팀','당진팀','태안팀','광장팀','동부팀','문예팀'],
  '평택그룹': ['평택팀','장당팀','삼거리팀','비전팀','오거리팀','성환팀'],
  '대전그룹': ['시장팀','조치원팀','태평팀','신관팀','대동팀'],
  '전북그룹': ['호성팀','서신팀','제일팀','미룡팀','송천팀'],
  '충북그룹': ['충의팀','하소팀','내토팀'],
  '제주그룹': ['화인팀','노형팀','이도팀','아라팀','천지팀'],
};
const GROUP_NAMES = Object.keys(GROUPS);
function teamGroup(team){
  return GROUP_NAMES.find(g=>GROUPS[g].includes(team)) || null;
}
const teamClass = (team)=>{
  const g = teamGroup(team);
  const idx = GROUP_NAMES.indexOf(g);
  return ['','team-b','team-c','team-d','team-e','team-f','team-g'][idx] || '';
};

/* ---------- global state ---------- */
let STATE = {
  users: [],
  calls: [],
  currentUserId: null,
  view: 'login', // login | signup | pending | trainee | admin-approve | admin-overview | calendar
  authError: '',
  authInfo: '',
  calMonthOffset: 0,
  calGroupFilter: null,
  calTeamFilter: 'all',
  modalCallId: null,
  calDetailDate: null,
  adminViewGroup: null,
  adminViewUserId: null,
  recState: { transcript:'', outcome:'visit_confirmed', visitDate:'', audioBase64:null, audioMime:null, audioFileName:'', audioUrl:null, audioUploading:false, audioDuration:null, custNameFirst:'', custNameLast:'', custPhoneLast4:'' },
  aiSharedKey: '',
  aiAnalyzing: false,
  aiNote: '',
};

async function init(){
  STATE.users = await loadUsers();
  STATE.calls = await loadCalls();
  STATE.aiSharedKey = await loadSharedSetting('gemini_api_key');
  const sess = await loadSession();
  if(sess && STATE.users.some(u=>u.id===sess)){
    STATE.currentUserId = sess;
    const u = STATE.users.find(x=>x.id===sess);
    STATE.view = u.role==='admin' ? 'admin-overview' : (u.status==='approved' ? 'trainee' : 'pending');
  }
  render();
}

function currentUser(){ return STATE.users.find(u=>u.id===STATE.currentUserId) || null; }

/* ---------- render root ---------- */
function render(){
  const app = document.getElementById('app');
  const u = currentUser();
  if(!u){
    app.innerHTML = renderAuthShell();
  } else {
    app.innerHTML = renderTopbar(u) + '<main>' + renderMain(u) + '</main>';
  }
  bindEvents();
}

/* ================= AUTH SCREENS ================= */
function renderAuthShell(){
  if(STATE.view==='signup') return authWrap(renderSignup());
  return authWrap(renderLogin());
}
function authWrap(inner){
  return `<div class="auth-shell"><div class="auth-card">
    <div class="auth-logo"><span class="dot"></span>포피플 신입 내방콜 전환 프로세스</div>
    <div class="auth-sub">신입 컨설턴트 내방유도콜 트레이닝 · 전환 관리 시스템</div>
    ${inner}
  </div></div>`;
}
function renderLogin(){
  return `
    ${STATE.authError ? `<div class="notice err">${STATE.authError}</div>`:''}
    ${STATE.authInfo ? `<div class="notice info">${STATE.authInfo}</div>`:''}
    <form id="loginForm">
      <label>이름</label>
      <input type="text" id="loginName" placeholder="예: 김민준" required>
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호" required>
      <div class="btn-row"><button type="submit" class="btn" style="width:100%">로그인</button></div>
    </form>
    <div class="switch-line">아직 계정이 없으신가요? <a id="goSignup">신입 회원가입</a></div>
  `;
}
function renderSignup(){
  return `
    ${STATE.authError ? `<div class="notice err">${STATE.authError}</div>`:''}
    <form id="signupForm">
      <label>이름</label>
      <input type="text" id="suName" placeholder="이름" required>
      <label>소속 그룹</label>
      <select id="suGroup" required>${GROUP_NAMES.map(g=>`<option value="${g}">${g}</option>`).join('')}</select>
      <label>소속팀</label>
      <select id="suTeam" required>${GROUPS[GROUP_NAMES[0]].map(t=>`<option value="${t}">${t}</option>`).join('')}</select>
      <label>연락처</label>
      <input type="tel" id="suPhone" placeholder="010-0000-0000" required>
      <label>비밀번호</label>
      <input type="password" id="suPw" placeholder="비밀번호 (4자 이상)" required>
      <div class="btn-row"><button type="submit" class="btn teal" style="width:100%">가입 요청 보내기</button></div>
    </form>
    <div class="key-note">가입 요청 후 관리자 승인이 완료되어야 로그인 및 콜 기록 등록이 가능합니다.</div>
    <div class="switch-line">이미 계정이 있으신가요? <a id="goLogin">로그인</a></div>
  `;
}

/* ================= TOPBAR ================= */
function renderTopbar(u){
  const isAdmin = u.role==='admin';
  const tabs = isAdmin
    ? [['admin-overview','전체 현황'],['admin-approve','가입 승인'],['calendar','캘린더'],['ai-settings','AI 연동']]
    : [['trainee','내 대시보드'],['calendar','캘린더']];
  return `
  <div class="topbar">
    <div class="brand"><span class="dot"></span>포피플 신입 내방콜 전환 프로세스</div>
    <div class="tabs">
      ${tabs.map(([v,l])=>`<button class="tab-btn ${STATE.view===v?'active':''}" data-nav="${v}">${l}</button>`).join('')}
    </div>
    <div class="who"><b>${u.name}</b>&nbsp;${isAdmin?'· 관리자':'· '+u.team}
      <button class="logout-btn" id="changePwBtn">비밀번호 변경</button>
      <button class="logout-btn" id="logoutBtn">로그아웃</button>
    </div>
  </div>`;
}

/* ================= MAIN ROUTER ================= */
function renderMain(u){
  if(u.role!=='admin' && u.status!=='approved'){
    return renderPending(u);
  }
  switch(STATE.view){
    case 'admin-approve': return renderAdminApprove();
    case 'admin-overview': return renderAdminOverview();
    case 'ai-settings': return renderAdminAISettings();
    case 'calendar': return renderCalendar(u);
    case 'trainee': default: return u.role==='admin' ? renderAdminOverview() : renderTrainee(u);
  }
}

function renderPending(u){
  return `<div class="card" style="max-width:520px;margin:40px auto;text-align:center;">
    <h2>승인 대기중입니다</h2>
    <div class="sub">관리자가 가입 요청을 승인하면 내방콜 기록을 등록할 수 있어요.</div>
    <span class="badge pending">승인 대기</span>
  </div>`;
}

/* ================= ADMIN: 가입 승인 ================= */
function renderAdminApprove(){
  const pending = STATE.users.filter(u=>u.role!=='admin' && u.status==='pending');
  const others = STATE.users.filter(u=>u.role!=='admin' && u.status!=='pending');
  return `
  <div class="card">
    <h2>가입 승인 대기</h2>
    <div class="sub">신입 컨설턴트의 회원가입 요청을 확인하고 승인/거절하세요.</div>
    ${pending.length===0 ? `<div class="empty">대기중인 요청이 없습니다.</div>` : `
    <div class="table-scroll"><table><thead><tr><th>이름</th><th>소속팀</th><th>연락처</th><th>신청일</th><th></th></tr></thead>
    <tbody>
      ${pending.map(p=>`
        <tr>
          <td>${p.name}</td><td>${p.team}</td><td class="muted">${p.phone}</td>
          <td class="muted">${new Date(p.joinedAt).toLocaleDateString('ko-KR')}</td>
          <td>
            <button class="btn teal sm" data-approve="${p.id}">승인</button>
            <button class="btn rose sm" data-reject="${p.id}">거절</button>
          </td>
        </tr>`).join('')}
    </tbody></table></div>`}
  </div>
  <div class="card">
    <h2>처리 완료 내역</h2>
    ${others.length===0 ? `<div class="empty">아직 처리된 계정이 없습니다.</div>` : `
    <div class="table-scroll"><table><thead><tr><th>이름</th><th>소속팀</th><th>상태</th></tr></thead>
    <tbody>
      ${others.map(p=>`<tr><td>${p.name}</td><td>${p.team}</td><td><span class="badge ${p.status}">${p.status==='approved'?'승인됨':'거절됨'}</span></td></tr>`).join('')}
    </tbody></table></div>`}
  </div>`;
}

/* ================= ADMIN: 전체 현황 ================= */
function renderAdminAISettings(){
  return `
  <div class="card" style="max-width:560px;">
    <h2>AI 연동 설정</h2>
    <div class="sub">여기서 Gemini API 키를 한 번 등록하면, 모든 팀원이 별도 입력 없이 자동으로 통화내용 AI 분석(내방 확정 여부·날짜 자동 인식)을 사용하게 돼요.</div>
    <label>Gemini API 키</label>
    <input type="password" id="sharedAiKeyInput" placeholder="aistudio.google.com에서 무료 발급" value="${escapeHtml(STATE.aiSharedKey)}">
    <div class="btn-row"><button class="btn teal" id="saveAiKeyBtn">저장</button></div>
    <div class="key-note">
      ⚠️ 주의: 이 키는 사이트에 로그인하는 모든 팀원의 브라우저에서 공통으로 사용돼요. 팀원이 개발자도구(F12)를 열면 이 키 값을 볼 수 있는 구조라서, 외부 유출에 주의해주세요. 문제가 생기면 Google AI Studio에서 언제든 키를 재발급/폐기할 수 있어요.
    </div>
    ${STATE.aiSharedKey ? '<div class="notice ok">현재 AI 연동이 설정되어 있습니다.</div>' : '<div class="notice info">아직 설정되지 않았습니다. 키를 등록하면 팀원들의 콜 기록 화면에 AI 자동 분석이 활성화됩니다.</div>'}
  </div>`;
}
function renderAdminOverview(){
  if(STATE.adminViewUserId) return renderAdminUserCalls(STATE.adminViewUserId);
  if(STATE.adminViewGroup) return renderAdminGroupMembers(STATE.adminViewGroup);

  const trainees = STATE.users.filter(u=>u.role!=='admin' && u.status==='approved');
  const totalCalls = STATE.calls.length;
  const totalVisits = STATE.calls.filter(c=>c.outcome==='visit_confirmed').length;
  const converted = trainees.filter(t=>monthlyCallCount(t.id)>=GOAL).length;
  const today = todayStr();
  const todaysCalls = STATE.calls.filter(c=>c.outcome==='visit_confirmed' && c.visitDate===today);
  return `
  ${todaysCalls.length>0 ? `
  <div class="today-banner">
    <span class="icon">🔔</span>
    <span>오늘(${today}) 전체 내방 예정 <b>${todaysCalls.length}건</b> — ${[...new Set(todaysCalls.map(c=>c.userName+' · '+c.team))].join(', ')}</span>
  </div>` : ''}
  <div class="card">
    <h2>전체 현황</h2>
    <div class="sub">당월 목표: <b>내방콜 200건</b></div>
    <div class="stat-row">
      <div class="stat-box"><div class="num">${trainees.length}</div><div class="lbl">진행중 신입</div></div>
      <div class="stat-box"><div class="num">${converted}</div><div class="lbl">당월 목표 달성</div></div>
      <div class="stat-box"><div class="num">${totalCalls}</div><div class="lbl">누적 콜 건수</div></div>
      <div class="stat-box"><div class="num">${totalVisits}</div><div class="lbl">내방 확정 건수</div></div>
    </div>
  </div>
  <div class="card">
    <h2>그룹별 신입 인원 현황</h2>
    <div class="sub">그룹을 누르면 소속 팀원 목록을 볼 수 있어요.</div>
    <div class="table-scroll"><table><thead><tr><th>그룹</th><th>신입 인원</th></tr></thead>
    <tbody>
      ${GROUP_NAMES.map(g=>{
        const count = trainees.filter(t=>teamGroup(t.team)===g).length;
        return `<tr data-open-group="${g}" style="cursor:pointer;"><td>${g}</td><td class="muted" style="font-family:var(--mono);">${count}명</td></tr>`;
      }).join('')}
    </tbody></table></div>
  </div>
  <div class="card">
    <h2>신입별 내방약속 순위 <span class="muted" style="font-size:11.5px;font-weight:400;">(이번 달)</span></h2>
    <div class="sub">이름을 누르면 해당 팀원의 콜 기록만 볼 수 있어요.</div>
    ${trainees.length===0 ? `<div class="empty">등록된 신입이 없습니다.</div>` : `
    <div class="table-scroll"><table><thead><tr><th>순위</th><th>이름</th><th>팀</th><th>내방 확정 건수</th></tr></thead>
    <tbody>
      ${trainees.map(t=>({ t, visits: monthlyVisitConfirmedCount(t.id) }))
        .sort((a,b)=>b.visits-a.visits)
        .map((row,i)=>{
          const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
          return `<tr data-open-user="${row.t.id}" style="cursor:pointer;">
            <td style="font-family:var(--mono);">${medal}</td>
            <td>${row.t.name}</td><td>${row.t.team}</td>
            <td class="muted" style="font-family:var(--mono);">${row.visits}건</td>
          </tr>`;
        }).join('')}
    </tbody></table></div>`}

  <div class="card">
    <h2>신입별 당월 진행률</h2>
    <div class="sub">이름을 누르면 해당 팀원의 콜 기록만 볼 수 있어요.</div>
    ${trainees.length===0 ? `<div class="empty">등록된 신입이 없습니다.</div>` : `
    <div class="table-scroll"><table><thead><tr><th>이름</th><th>팀</th><th>진행률</th><th>이번달 콜 건수</th><th>상태</th></tr></thead>
    <tbody>
      ${trainees.map(t=>{

        return `<tr data-open-user="${t.id}" style="cursor:pointer;">

      }).join('')}
    </tbody></table></div>`}

}

  return `
  <div class="card">
    <button class="btn ghost sm" id="adminBackGroup">‹ 그룹 목록으로</button>
    <h2 style="margin-top:14px;">${group}</h2>
    <div class="sub">이 그룹 소속 팀원 목록이에요. 이름을 누르면 콜 기록을 볼 수 있어요.</div>
  </div>
  <div class="card">
    ${members.length===0 ? `<div class="empty">이 그룹에 소속된 팀원이 없습니다.</div>` : `
    <div class="table-scroll"><table><thead><tr><th>이름</th><th>팀</th><th>당월 콜 건수</th></tr></thead>
    <tbody>
      ${members.map(m=>{
        const cnt = monthlyCallCount(m.id);
        return `<tr data-open-user="${m.id}" style="cursor:pointer;">

          <td class="muted" style="font-family:var(--mono);">${cnt} / ${GOAL}</td>

}

function renderAdminUserCalls(userId){
  const user = STATE.users.find(x=>x.id===userId);
  if(!user) return `<div class="card"><div class="empty">사용자를 찾을 수 없습니다.</div></div>`;
  const myCalls = STATE.calls.filter(c=>c.userId===userId).sort((a,b)=>b.createdAt-a.createdAt);
  return `
  <div class="card">
    <button class="btn ghost sm" id="adminBackUser">‹ 목록으로</button>
    <h2 style="margin-top:14px;">${user.name} · ${user.team}</h2>
    <div class="sub">이 팀원의 콜 기록이에요. 항목을 누르면 녹취 재생과 전체 텍스트를 확인할 수 있어요.</div>
  </div>
  <div class="card">
    ${myCalls.length===0 ? `<div class="empty">등록된 콜 기록이 없습니다.</div>` : `
    <div class="table-scroll"><table><thead><tr><th>#</th><th>일시</th><th>결과</th><th>내방일</th><th>고객</th><th>녹취 텍스트</th></tr></thead>
    <tbody>
      ${myCalls.map((c,i)=>`
        <tr data-open-call="${c.id}" style="cursor:pointer;">
          <td class="muted" style="font-family:var(--mono);">${myCalls.length-i}</td>
          <td class="muted">${new Date(c.createdAt).toLocaleString('ko-KR')}</td>
          <td>${outcomeBadge(c.outcome)}</td>
          <td class="muted">${c.visitDate||'-'}</td>
          <td class="muted">${c.customerName||'-'}<br><span style="font-size:11px;">${c.customerPhone||''}</span></td>
          <td style="max-width:320px;">${(c.transcript||'').slice(0,80)}${(c.transcript||'').length>80?'…':''}</td>
        </tr>`).join('')}
    </tbody></table></div>`}
  </div>`;
}

/* ================= TRAINEE DASHBOARD ================= */
function renderTrainee(u){
  const myCalls = STATE.calls.filter(c=>c.userId===u.id).sort((a,b)=>b.createdAt-a.createdAt);
  const cnt = monthlyCallCount(u.id);
  const pct = Math.min(100, cnt/GOAL*100);
  const r = 42, c = 2*Math.PI*r;
  const dash = c*pct/100;
  const done = cnt>=GOAL;
  const rs = STATE.recState;
  const todaysVisits = STATE.calls.filter(c=>c.userId===u.id && c.outcome==='visit_confirmed' && c.visitDate===todayStr());

  return `
  ${todaysVisits.length>0 ? `
  <div class="today-banner">
    <span class="icon">🔔</span>
    <span>오늘(${todayStr()}) 내방 예정 고객이 <b>${todaysVisits.length}건</b> 있습니다. 미리 준비하고 케어해주세요!</span>
  </div>` : ''}
  <div class="grid2">
    <div class="card">
      <h2>당월 목표</h2>
      <div class="sub">이번 달 내방콜 목표는 <b>${GOAL}건</b>이에요.</div>
      <div class="ring-wrap">
        <svg width="104" height="104" viewBox="0 0 104 104">
          <circle cx="52" cy="52" r="${r}" fill="none" stroke="#EEF1F5" stroke-width="10"/>
          <circle cx="52" cy="52" r="${r}" fill="none" stroke="${done?'#2E8B84':'#142850'}" stroke-width="10"
            stroke-linecap="round" stroke-dasharray="${dash} ${c}" transform="rotate(-90 52 52)"/>
        </svg>
        <div class="ring-num">
          <div class="big">${cnt}<span class="small"> / ${GOAL}</span></div>
          <div class="small">${done? '이번 달 목표 달성 🎉' : (GOAL-cnt)+'건 남음'}</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>콜 기록 등록</h2>
      <div class="sub">휴대폰에 저장된 통화 녹음 파일을 업로드해야 콜 기록을 저장할 수 있어요. AI 분석은 저장 전이나 후, 원하는 때에 실행하면 돼요.</div>

        <label style="margin-top:0;">📎 녹음 파일 업로드</label>

        ${rs.audioDuration!=null && rs.audioDuration<30 ? `<div class="footnote" style="color:var(--rose);">⚠️ 30초 이상 통화만 AI 분석이 가능해요. (콜 기록 저장은 가능해요)</div>` : ''}
        ${STATE.aiAnalyzing ? `<div class="footnote">🔄 업로드한 녹음을 분석하는 중이에요. 잠시만 기다려주세요...</div>` : ''}
      </div>
      <label>녹취 텍스트 (자동 변환 결과, 직접 수정 가능)</label>

      <div class="rec-box" style="margin-top:10px;">
        <label style="margin-top:0;">🤖 AI 자동 분석</label>
        ${STATE.aiSharedKey ? `
          <div class="btn-row" style="margin-top:0;">
            <button class="btn ghost sm" id="aiAnalyzeBtn" ${STATE.aiAnalyzing? 'disabled':''}>${STATE.aiAnalyzing? '분석 중...' : '🤖 AI로 분석하기'}</button>

        <label>내방 예정일</label>

          <input type="text" id="custNameLast" maxlength="1" placeholder="명" value="${escapeHtml(rs.custNameLast||'')}" style="width:56px;text-align:center;">
          <span class="muted" style="font-size:12px;">캘린더 표시: <b>${escapeHtml(rs.custNameFirst||'?')}*${escapeHtml(rs.custNameLast||'?')}</b></span>
        </div>

        <label>고객 연락처 (뒤 4자리만)</label>
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-family:var(--mono);color:var(--ink-muted);font-size:14px;">010-****-</span>
          <input type="text" id="custPhoneLast4" maxlength="4" inputmode="numeric" placeholder="0000" value="${escapeHtml(rs.custPhoneLast4||'')}" style="width:100px;">
        </div>
      ` : ''}
      <div class="btn-row">
        <button class="btn teal" id="saveCallBtn">콜 기록 저장</button>
        <button class="btn ghost" id="clearCallBtn">초기화</button>
      </div>

  <div class="card">
    <h2>내 콜 기록</h2>

    ${myCalls.length===0 ? `<div class="empty">등록된 콜 기록이 없습니다.</div>` : `
    <div class="table-scroll"><table><thead><tr><th>#</th><th>일시</th><th>결과</th><th>내방일</th><th>고객</th><th>녹취 텍스트</th></tr></thead>
    <tbody>
      ${myCalls.map((c,i)=>`
        <tr data-open-call="${c.id}" style="cursor:pointer;">
          <td class="muted" style="font-family:var(--mono);">${myCalls.length-i}</td>
          <td class="muted">${new Date(c.createdAt).toLocaleString('ko-KR')}</td>
          <td>${outcomeBadge(c.outcome)}</td>
          <td class="muted">${c.visitDate||'-'}</td>
          <td class="muted">${c.customerName||'-'}<br><span style="font-size:11px;">${c.customerPhone||''}</span></td>
          <td style="max-width:320px;">${(c.transcript||'').slice(0,80)}${(c.transcript||'').length>80?'…':''}</td>
        </tr>`).join('')}
    </tbody></table></div>`}
  </div>`;
}

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function monthlyCallCount(userId){
  const now = new Date();
  return STATE.calls.filter(c=>{
    if(c.userId!==userId) return false;
    const d = new Date(c.createdAt);
    return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
  }).length;
}
function monthlyVisitConfirmedCount(userId){
  const now = new Date();
  return STATE.calls.filter(c=>{
    if(c.userId!==userId || c.outcome!=='visit_confirmed') return false;
    const d = new Date(c.createdAt);
    return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
  }).length;
}
function outcomeBadge(o){
  if(o==='visit_confirmed') return '<span class="badge visit">내방 확정</span>';
  if(o==='callback') return '<span class="badge callback">재통화 필요</span>';
  return '<span class="badge declined">거절</span>';
}
function formatTime(s){
  const m = Math.floor(s/60).toString().padStart(2,'0');
  const sec = (s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ================= CALENDAR ================= */
function renderCalendar(u){
  if(!STATE.calGroupFilter){
    STATE.calGroupFilter = u.role==='admin' ? 'all' : (teamGroup(u.team) || 'all');
    STATE.calTeamFilter = 'all';
  }
  const now = new Date();
  now.setMonth(now.getMonth()+STATE.calMonthOffset);
  const year = now.getFullYear(), month = now.getMonth();
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const prevDays = new Date(year, month, 0).getDate();

  const visits = STATE.calls.filter(c=>c.outcome==='visit_confirmed' && c.visitDate);
  let scoped = visits;
  if(STATE.calGroupFilter !== 'all'){
    scoped = scoped.filter(v=>teamGroup(v.team)===STATE.calGroupFilter);
  }
  if(STATE.calTeamFilter !== 'all'){
    scoped = scoped.filter(v=>v.team===STATE.calTeamFilter);
  }

  const teamOptions = STATE.calGroupFilter==='all'
    ? GROUP_NAMES.flatMap(g=>GROUPS[g])
    : GROUPS[STATE.calGroupFilter] || [];

  let cells = [];
  for(let i=0;i<startWeekday;i++){
    cells.push({d: prevDays-startWeekday+i+1, out:true});
  }
  for(let d=1; d<=daysInMonth; d++){
    cells.push({d, out:false, dateStr: `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`});
  }
  while(cells.length % 7 !==0){ cells.push({d: cells.length, out:true}); }

  const monthLabel = now.toLocaleDateString('ko-KR',{year:'numeric',month:'long'});

  return `
  <div class="card">
    <div class="cal-head">
      <div class="month-label">${monthLabel}</div>
      <div class="cal-nav">
        <button class="btn ghost sm" id="calPrev">‹ 이전</button>
        <button class="btn ghost sm" id="calNext">다음 ›</button>
      </div>
    </div>
    <label>그룹</label>
    <select id="calGroupSelect">
      <option value="all" ${STATE.calGroupFilter==='all'?'selected':''}>전체 그룹</option>
      ${GROUP_NAMES.map(g=>`<option value="${g}" ${STATE.calGroupFilter===g?'selected':''}>${g}</option>`).join('')}
    </select>
    <label>팀</label>
    <select id="calTeamSelect">
      <option value="all" ${STATE.calTeamFilter==='all'?'selected':''}>전체 팀</option>
      ${teamOptions.map(t=>`<option value="${t}" ${STATE.calTeamFilter===t?'selected':''}>${t}</option>`).join('')}
    </select>
    <div class="sub" style="margin-top:12px;">날짜를 클릭하면 팀별·담당자별 내방 예정 건수를 확인할 수 있어요.</div>
    <div class="cal-grid">
      ${['일','월','화','수','목','금','토'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells.map(cell=>{
        if(cell.out) return `<div class="cal-cell out"><div class="d-num">${cell.d}</div></div>`;
        const dayVisits = scoped.filter(v=>v.visitDate===cell.dateStr);
        const cnt = dayVisits.length;
        return `<div class="cal-cell ${cnt>0?'has-visits':''}" ${cnt>0?`data-open-day="${cell.dateStr}"`:''}>
          <div class="d-num">${cell.d}</div>
          ${cnt>0 ? `<div class="day-count">${cnt}건</div>` : ''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderDayModal(){
  const dateStr = STATE.calDetailDate;
  if(!dateStr) return '';
  const u = currentUser();
  let visits = STATE.calls.filter(c=>c.outcome==='visit_confirmed' && c.visitDate===dateStr);
  if(STATE.calGroupFilter && STATE.calGroupFilter!=='all'){
    visits = visits.filter(v=>teamGroup(v.team)===STATE.calGroupFilter);
  }
  if(STATE.calTeamFilter && STATE.calTeamFilter!=='all'){
    visits = visits.filter(v=>v.team===STATE.calTeamFilter);
  }

  const byTeam = {};
  visits.forEach(v=>{ (byTeam[v.team] = byTeam[v.team]||[]).push(v); });
  const byUser = {};
  visits.forEach(v=>{ (byUser[v.userName] = byUser[v.userName]||[]).push(v); });

  const renderGroup = (groups)=> Object.entries(groups).map(([name, list])=>`
    <div class="feedback-item">
      <div class="meta" style="font-weight:700;color:var(--ink);font-size:13px;">${name} · ${list.length}건</div>
      ${list.map(v=>`<div style="font-size:12.5px;color:var(--teal);cursor:pointer;margin-top:2px;" data-open-call-from-day="${v.id}">· ${v.userName} (${v.team}) — 고객: ${escapeHtml(v.customerName||'-')} / ${escapeHtml(v.customerPhone||'-')}</div>`).join('')}
    </div>`).join('');

  return `
  <div class="modal-bg" id="dayModalBg">
    <div class="modal">
      <span class="close-x" id="dayModalClose">×</span>
      <h3>${dateStr}</h3>
      <div class="sub">내방 예정 총 <b>${visits.length}건</b></div>

      <label>팀별 내방예정건</label>
      ${Object.keys(byTeam).length===0 ? `<div class="muted" style="font-size:13px;margin-bottom:10px;">예정된 내방이 없습니다.</div>` : renderGroup(byTeam)}

      <label>담당자별 내방예정건</label>
      ${Object.keys(byUser).length===0 ? `<div class="muted" style="font-size:13px;">예정된 내방이 없습니다.</div>` : renderGroup(byUser)}
    </div>
  </div>`;
}

      <label>녹취 텍스트</label>

      ${call.outcome==='visit_confirmed' ? `

        ${(call.feedback||[]).length===0 ? `<div class="muted" style="font-size:13px;margin-bottom:8px;">등록된 피드백이 없습니다.</div>` :
          call.feedback.map(f=>`<div class="feedback-item"><div class="meta">${f.author} · ${new Date(f.at).toLocaleString('ko-KR')}</div>${escapeHtml(f.text)}</div>`).join('')}
        <textarea id="feedbackInput" placeholder="피드백을 입력하세요"></textarea>
        <div class="btn-row"><button class="btn teal" id="addFeedbackBtn">피드백 등록</button></div>
      ` : ''}

/* ================= EVENTS ================= */
function bindEvents(){
  const app = document.getElementById('app');

  const goSignup = document.getElementById('goSignup');
  if(goSignup) goSignup.onclick = ()=>{ STATE.view='signup'; STATE.authError=''; render(); };
  const goLogin = document.getElementById('goLogin');
  if(goLogin) goLogin.onclick = ()=>{ STATE.view='login'; STATE.authError=''; render(); };

  const suGroupEl = document.getElementById('suGroup');
  if(suGroupEl){
    suGroupEl.onchange = (e)=>{
      const teamSel = document.getElementById('suTeam');
      if(teamSel){
        teamSel.innerHTML = GROUPS[e.target.value].map(t=>`<option value="${t}">${t}</option>`).join('');
      }
    };
  }

  const loginForm = document.getElementById('loginForm');
  if(loginForm) loginForm.onsubmit = async (e)=>{
    e.preventDefault();
    const name = document.getElementById('loginName').value.trim();
    const pw = document.getElementById('loginPw').value;
    const u = STATE.users.find(x=>x.name===name && x.password===pw);
    if(!u){ STATE.authError='이름 또는 비밀번호가 일치하지 않습니다.'; render(); return; }
    STATE.currentUserId = u.id;
    STATE.authError=''; STATE.authInfo='';
    await saveSession(u.id);
    STATE.view = u.role==='admin' ? 'admin-overview' : (u.status==='approved' ? 'trainee' : 'pending');
    render();
  };

  const signupForm = document.getElementById('signupForm');
  if(signupForm) signupForm.onsubmit = async (e)=>{
    e.preventDefault();
    const name = document.getElementById('suName').value.trim();
    const team = document.getElementById('suTeam').value;
    const phone = document.getElementById('suPhone').value.trim();
    const pw = document.getElementById('suPw').value;
    if(pw.length<4){ STATE.authError='비밀번호는 4자 이상이어야 합니다.'; render(); return; }
    if(STATE.users.some(u=>u.name===name)){ STATE.authError='이미 존재하는 이름입니다.'; render(); return; }
    const newUser = { id: uid('u'), name, team, phone, password:pw, role:'trainee', status:'pending', joinedAt: Date.now(), callCount:0 };
    STATE.users.push(newUser);
    await saveUsers(STATE.users);
    STATE.view='login'; STATE.authError='';
    STATE.authInfo='가입 요청이 접수되었습니다. 관리자 승인 후 로그인해주세요.';
    render();
  };

  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) logoutBtn.onclick = async ()=>{
    STATE.currentUserId = null;
    await saveSession(null);
    STATE.view='login';
    render();
  };

  const changePwBtn = document.getElementById('changePwBtn');
  if(changePwBtn) changePwBtn.onclick = openPasswordModal;

  app.querySelectorAll('[data-nav]').forEach(btn=>{
    btn.onclick = ()=>{
      STATE.view = btn.getAttribute('data-nav');
      STATE.adminViewGroup = null;
      STATE.adminViewUserId = null;
      render();
    };
  });

  app.querySelectorAll('[data-approve]').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.getAttribute('data-approve');
      const u = STATE.users.find(x=>x.id===id);
      if(u){ u.status='approved'; await saveUsers(STATE.users); render(); }
    };
  });
  app.querySelectorAll('[data-reject]').forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.getAttribute('data-reject');
      const u = STATE.users.find(x=>x.id===id);
      if(u){ u.status='rejected'; await saveUsers(STATE.users); render(); }
    };
  });

  /* audio file upload */
  const audioFileInput = document.getElementById('audioFileInput');
  if(audioFileInput) audioFileInput.onchange = async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 15*1024*1024){
      alert('파일이 너무 큽니다. 15MB 이하의 녹음 파일로 업로드해주세요.');
      e.target.value = '';
      return;
    }
    STATE.recState.audioFileName = file.name;
    STATE.recState.audioUploading = true;
    render();
    try{
      const base64 = await readFileAsBase64(file);
      STATE.recState.audioBase64 = base64;
      STATE.recState.audioMime = resolveAudioMime(file);
      try{
        STATE.recState.audioDuration = await getAudioDurationFromFile(file);
      }catch(durErr){
        STATE.recState.audioDuration = null;
      }
      await uploadAudioToStorage(file); // wait for upload so it's guaranteed saved with the record
    }catch(err){
      STATE.recState.audioUploading = false;
      render();
      alert('파일을 읽는 중 오류가 발생했습니다: ' + err.message);
    }
  };

  const transcriptEdit = document.getElementById('transcriptEdit');
  if(transcriptEdit){
    transcriptEdit.oninput = (e)=>{ STATE.recState.transcript = e.target.value; };
    transcriptEdit.onblur = ()=>{
      if(STATE.aiSharedKey && (STATE.recState.transcript||'').trim() && !STATE.aiAnalyzing){
        analyzeTranscriptWithAI();
      }
    };
  }

  const aiAnalyzeBtn = document.getElementById('aiAnalyzeBtn');
  if(aiAnalyzeBtn) aiAnalyzeBtn.onclick = ()=>{
    if(STATE.recState.audioBase64){ analyzeAudioWithAI(); }
    else{ analyzeTranscriptWithAI(); }
  };

  const saveAiKeyBtn = document.getElementById('saveAiKeyBtn');
  if(saveAiKeyBtn) saveAiKeyBtn.onclick = async ()=>{
    const val = (document.getElementById('sharedAiKeyInput').value||'').trim();
    await saveSharedSetting('gemini_api_key', val);
    STATE.aiSharedKey = val;
    render();
  };

  app.querySelectorAll('[data-outcome]').forEach(p=>{
    p.onclick = ()=>{ STATE.recState.outcome = p.getAttribute('data-outcome'); render(); };
  });
  const visitDateInput = document.getElementById('visitDateInput');
  if(visitDateInput) visitDateInput.onchange = (e)=>{ STATE.recState.visitDate = e.target.value; };

  const custNameFirst = document.getElementById('custNameFirst');
  if(custNameFirst) custNameFirst.oninput = (e)=>{
    STATE.recState.custNameFirst = e.target.value.slice(0,1);
    const preview = e.target.parentElement.querySelector('.muted b');
    if(preview) preview.textContent = `${STATE.recState.custNameFirst||'?'}*${STATE.recState.custNameLast||'?'}`;
  };
  const custNameLast = document.getElementById('custNameLast');
  if(custNameLast) custNameLast.oninput = (e)=>{
    STATE.recState.custNameLast = e.target.value.slice(0,1);
    const preview = e.target.parentElement.querySelector('.muted b');
    if(preview) preview.textContent = `${STATE.recState.custNameFirst||'?'}*${STATE.recState.custNameLast||'?'}`;
  };
  const custPhoneLast4 = document.getElementById('custPhoneLast4');
  if(custPhoneLast4) custPhoneLast4.oninput = (e)=>{
    const digits = e.target.value.replace(/[^0-9]/g,'').slice(0,4);
    e.target.value = digits;
    STATE.recState.custPhoneLast4 = digits;
  };

  const saveCallBtn = document.getElementById('saveCallBtn');
  if(saveCallBtn) saveCallBtn.onclick = async ()=>{
    const u = currentUser();
    const rs = STATE.recState;
    if(!rs.audioBase64){
      alert('녹취 파일을 먼저 업로드해야 콜 기록을 저장할 수 있어요.');
      return;
    }
    if(rs.audioUploading){
      alert('녹취 파일 저장이 아직 끝나지 않았어요. 잠시만 기다려주세요.');
      return;
    }
    if(rs.outcome==='visit_confirmed'){
      if(!rs.visitDate){
        alert('내방 확정 건은 내방 예정일을 입력해주세요.');
        return;
      }
      if(!rs.custNameFirst || !rs.custNameLast){
        alert('내방 확정 건은 고객 이름(첫 글자·마지막 글자)을 입력해주세요.');
        return;
      }
      if(!rs.custPhoneLast4 || rs.custPhoneLast4.length!==4){
        alert('내방 확정 건은 고객 연락처 뒤 4자리를 입력해주세요.');
        return;
      }
    }
    const call = {
      id: uid('c'), userId:u.id, userName:u.name, team:u.team,
      createdAt: Date.now(), transcript: rs.transcript||'',
      outcome: rs.outcome, visitDate: rs.outcome==='visit_confirmed'? rs.visitDate : null,
      customerName: rs.outcome==='visit_confirmed' ? `${rs.custNameFirst}*${rs.custNameLast}` : null,
      customerPhone: rs.outcome==='visit_confirmed' ? `010-****-${rs.custPhoneLast4}` : null,
      feedback: [], audioUrl: rs.audioUrl || null
    };
    STATE.calls.push(call);
    await saveCalls(STATE.calls);
    u.callCount = (u.callCount||0)+1;
    await saveUsers(STATE.users);
    STATE.recState = { transcript:'', outcome:'visit_confirmed', visitDate:'', audioBase64:null, audioMime:null, audioFileName:'', audioUrl:null, audioUploading:false, audioDuration:null, custNameFirst:'', custNameLast:'', custPhoneLast4:'' };
    STATE.aiNote = '';
    render();
  };
  const clearCallBtn = document.getElementById('clearCallBtn');
  if(clearCallBtn) clearCallBtn.onclick = ()=>{
    STATE.recState = { transcript:'', outcome:'visit_confirmed', visitDate:'', audioBase64:null, audioMime:null, audioFileName:'', audioUrl:null, audioUploading:false, audioDuration:null, custNameFirst:'', custNameLast:'', custPhoneLast4:'' };
    STATE.aiNote = '';
    render();
  };

  /* calendar */
  const calPrev = document.getElementById('calPrev');
  if(calPrev) calPrev.onclick = ()=>{ STATE.calMonthOffset--; render(); };
  const calNext = document.getElementById('calNext');
  if(calNext) calNext.onclick = ()=>{ STATE.calMonthOffset++; render(); };
  const calGroupSelect = document.getElementById('calGroupSelect');
  if(calGroupSelect) calGroupSelect.onchange = (e)=>{
    STATE.calGroupFilter = e.target.value;
    STATE.calTeamFilter = 'all';
    render();
  };
  const calTeamSelect = document.getElementById('calTeamSelect');
  if(calTeamSelect) calTeamSelect.onchange = (e)=>{
    STATE.calTeamFilter = e.target.value;
    render();
  };

  app.querySelectorAll('[data-open-call]').forEach(el=>{
    el.onclick = ()=>{
      STATE.modalCallId = el.getAttribute('data-open-call');
      openModal();
    };
  });

  app.querySelectorAll('[data-open-day]').forEach(el=>{
    el.onclick = ()=>{
      openDayModal(el.getAttribute('data-open-day'));
    };
  });

  app.querySelectorAll('[data-open-group]').forEach(el=>{
    el.onclick = ()=>{
      STATE.adminViewGroup = el.getAttribute('data-open-group');
      STATE.adminViewUserId = null;
      render();
    };
  });
  app.querySelectorAll('[data-open-user]').forEach(el=>{
    el.onclick = ()=>{
      STATE.adminViewUserId = el.getAttribute('data-open-user');
      render();
    };
  });
  const adminBackGroup = document.getElementById('adminBackGroup');
  if(adminBackGroup) adminBackGroup.onclick = ()=>{ STATE.adminViewGroup = null; render(); };
  const adminBackUser = document.getElementById('adminBackUser');
  if(adminBackUser) adminBackUser.onclick = ()=>{ STATE.adminViewUserId = null; render(); };
}

function openModal(){
  const existing = document.getElementById('modalBg');
  if(existing) existing.remove();
  const wrapper = document.createElement('div');
  wrapper.innerHTML = renderCallModal();
  if(!wrapper.firstElementChild) return;
  document.body.appendChild(wrapper.firstElementChild);
  document.getElementById('modalClose').onclick = closeModal;
  document.getElementById('modalBg').onclick = (e)=>{ if(e.target.id==='modalBg') closeModal(); };

  const addFeedbackBtn = document.getElementById('addFeedbackBtn');
  if(addFeedbackBtn){
    addFeedbackBtn.onclick = async ()=>{
      const text = document.getElementById('feedbackInput').value.trim();
      if(!text) return;
      const call = STATE.calls.find(c=>c.id===STATE.modalCallId);
      const u = currentUser();
      call.feedback = call.feedback || [];
      call.feedback.push({ id: uid('f'), author:u.name, text, at: Date.now() });
      await saveCalls(STATE.calls);
      closeModal();
      render();
    };
  }

  const deleteCallBtn = document.getElementById('deleteCallBtn');
  if(deleteCallBtn){
    deleteCallBtn.onclick = async ()=>{
      if(!confirm('이 콜 기록을 삭제하시겠습니까? 되돌릴 수 없습니다.')) return;
      const ok = await deleteCallRecord(STATE.modalCallId);
      if(ok){
        closeModal();
        render();
      }
    };
  }

  const analyzeSavedBtn = document.getElementById('analyzeSavedBtn');
  if(analyzeSavedBtn){
    analyzeSavedBtn.onclick = ()=>{ analyzeSavedCall(STATE.modalCallId); };
  }
}
function closeModal(){
  const m = document.getElementById('modalBg');
  if(m) m.remove();
  STATE.modalCallId = null;
  STATE.aiNote = '';
}

function openDayModal(dateStr){
  STATE.calDetailDate = dateStr;
  const existing = document.getElementById('dayModalBg');
  if(existing) existing.remove();
  const wrapper = document.createElement('div');
  wrapper.innerHTML = renderDayModal();
  if(!wrapper.firstElementChild) return;
  document.body.appendChild(wrapper.firstElementChild);
  document.getElementById('dayModalClose').onclick = closeDayModal;
  document.getElementById('dayModalBg').onclick = (e)=>{ if(e.target.id==='dayModalBg') closeDayModal(); };
  document.querySelectorAll('#dayModalBg [data-open-call-from-day]').forEach(el=>{
    el.onclick = ()=>{
      const id = el.getAttribute('data-open-call-from-day');
      closeDayModal();
      STATE.modalCallId = id;
      openModal();
    };
  });
}
function closeDayModal(){
  const m = document.getElementById('dayModalBg');
  if(m) m.remove();
  STATE.calDetailDate = null;
}

      <input type="password" id="pwCurrent">

function closePasswordModal(){

async function savePasswordChange(){
  const u = currentUser();
  const cur = document.getElementById('pwCurrent').value;
  const nw = document.getElementById('pwNew').value;
  const cf = document.getElementById('pwConfirm').value;
  const errBox = document.getElementById('pwErrorBox');
  const showErr = (msg)=>{ errBox.innerHTML = `<div class="notice err">${msg}</div>`; };
  if(cur !== u.password){ showErr('현재 비밀번호가 일치하지 않습니다.'); return; }
  if(nw.length<4){ showErr('새 비밀번호는 4자 이상이어야 합니다.'); return; }
  if(nw !== cf){ showErr('새 비밀번호가 서로 일치하지 않습니다.'); return; }

async function deleteCallRecord(callId){
  const call = STATE.calls.find(c=>c.id===callId);
  if(!call) return false;
  try{
    const { error } = await supabaseClient.from('pp_calls').delete().eq('id', callId);
    if(error) throw error;
  }catch(e){
    console.error('deleteCallRecord error', e);
    alert('삭제에 실패했습니다: ' + e.message + '\n(Supabase의 pp_calls 테이블에 삭제 권한 정책이 있는지 확인해주세요)');
    return false;
  }
  if(call.audioUrl){
    try{
      const path = call.audioUrl.split('/call-recordings/')[1];
      if(path) await supabaseClient.storage.from('call-recordings').remove([path]);
    }catch(e){ console.error('audio delete error', e); }
  }
  STATE.calls = STATE.calls.filter(c=>c.id!==callId);
  return true;
}

/* ================= AUDIO FILE UPLOAD ================= */
function readFileAsBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function getAudioDurationFromSrc(src){
  return new Promise((resolve, reject)=>{
    const audio = document.createElement('audio');
    audio.preload = 'metadata';
    audio.onloadedmetadata = ()=> resolve(audio.duration);
    audio.onerror = ()=> reject(new Error('오디오 길이를 확인할 수 없습니다.'));
    audio.src = src;
  });
}
function getAudioDurationFromFile(file){
  const url = URL.createObjectURL(file);
  return getAudioDurationFromSrc(url).then(
    d=>{ URL.revokeObjectURL(url); return d; },
    e=>{ URL.revokeObjectURL(url); throw e; }
  );
}

function safeFileExt(name){
  const m = /\.[a-zA-Z0-9]+$/.exec(name||'');
  return m ? m[0] : '';
}

async function uploadAudioToStorage(file){
  try{
    const path = `${uid('rec')}${safeFileExt(file.name)}`;
    const { error } = await supabaseClient.storage.from('call-recordings').upload(path, file, {
      contentType: file.type || 'audio/mpeg', upsert: false
    });
    if(error) throw error;
    const { data } = supabaseClient.storage.from('call-recordings').getPublicUrl(path);
    STATE.recState.audioUrl = data.publicUrl;
  }catch(e){
    console.error('uploadAudioToStorage error', e);
  }finally{
    STATE.recState.audioUploading = false;
    render();
  }
}

function resolveAudioMime(file){
  const name = (file.name||'').toLowerCase();
  const ext = name.includes('.') ? name.split('.').pop() : '';
  const extMap = {
    m4a:'audio/m4a', mp3:'audio/mp3', wav:'audio/wav', aac:'audio/aac',
    ogg:'audio/ogg', oga:'audio/ogg', flac:'audio/flac', webm:'audio/webm',
    mp4:'audio/mp4', mpga:'audio/mpga', mpeg:'audio/mpeg', mpa:'audio/m4a', aiff:'audio/aiff'
  };
  if(extMap[ext]) return extMap[ext];
  if(file.type && file.type.startsWith('audio/')) return file.type;
  return 'audio/mp4';
}
function resolveAudioMimeFromUrl(url){
  return resolveAudioMime({ name: (url||'').split('?')[0] });
}
function fetchUrlAsBase64(url){
  return fetch(url).then(res=>res.blob()).then(blob=>new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  }));
}

async function callGeminiAPI(key, parts, attempt){
  attempt = attempt || 1;
  const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=' + encodeURIComponent(key), {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts }] })
  });
  let data;
  try{ data = await res.json(); }catch(e){ throw new Error('서버 응답을 읽을 수 없습니다.'); }
  if(data.error){
    const msg = data.error.message || 'API 오류';
    const overloaded = res.status===503 || /overloaded|high demand|unavailable/i.test(msg);
    if(overloaded && attempt<4){
      await new Promise(r=>setTimeout(r, attempt*1500));
      return callGeminiAPI(key, parts, attempt+1);
    }
    throw new Error(msg);
  }
  const cand = (data.candidates||[])[0];
  const textPart = cand && cand.content && cand.content.parts && cand.content.parts[0];
  if(!textPart || !textPart.text){ throw new Error('AI 응답을 읽을 수 없습니다.'); }
  return textPart.text;
}

  }

2) 통화 내용을 분석해서 결과를 판단하세요.

아래 JSON 형식으로만 답변하세요. 다른 설명, 마크다운, 코드블록 없이 순수 JSON 한 줄만 출력하세요.

  }catch(e){

  }
